<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享不存在 - SnippetBox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .error-container {
            max-width: 500px;
        }
        .icon {
            font-size: 72px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }
        p {
            color: #8b949e;
            font-size: 18px;
            margin-bottom: 30px;
        }
        a {
            color: #58a6ff;
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid #58a6ff;
            border-radius: 6px;
            display: inline-block;
            transition: all 0.2s;
        }
        a:hover {
            background: #58a6ff;
            color: #0d1117;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="icon">🔍</div>
        <h1>分享不存在</h1>
        <p>{{ message }}</p>
        <a href="https://github.com/snippetbox">了解 SnippetBox</a>
    </div>
</body>
</html>
